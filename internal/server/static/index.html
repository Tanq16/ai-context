<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Context</title>

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/inter.css">

    <!-- Lucide Icons -->
    <script src="/static/js/lucide.min.js"></script>

    <!-- Tailwind Config -->
    <script src="/static/js/tailwindcss.js"></script>

    <!-- Catppuccin Theme Variables -->
    <style>
        :root {
            --rosewater: #f5e0dc; --flamingo: #f2cdcd; --pink: #f5c2e7;
            --mauve: #cba6f7; --red: #f38ba8; --maroon: #eba0ac;
            --peach: #fab387; --yellow: #f9e2af; --green: #a6e3a1;
            --teal: #94e2d5; --sky: #89dceb; --sapphire: #74c7ec;
            --blue: #89b4fa; --lavender: #b4befe; --text: #cdd6f4;
            --subtext1: #bac2de; --subtext0: #a6adc8; --overlay2: #9399b2;
            --overlay1: #7f849c; --overlay0: #6c7086; --surface2: #585b70;
            --surface1: #45475a; --surface0: #313244; --base: #1e1e2e;
            --mantle: #181825; --crust: #11111b;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        /* scrollbar styles */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--base); }
        ::-webkit-scrollbar-thumb {
            background-color: var(--surface1);
            border-radius: 10px;
            border: 2px solid var(--base);
        }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--overlay2); }
        ::placeholder { color: var(--subtext0); opacity: 0.7; }

        .input-underline {
            background-color: transparent;
            border: none;
            border-bottom: 2px solid var(--surface0);
            border-radius: 0;
            padding-left: 0.25rem;
            padding-right: 0.25rem;
            transition: border-color 0.3s;
        }
        .input-underline:focus {
            outline: none;
            border-bottom-color: var(--peach);
            box-shadow: none;
            --tw-ring-shadow: none;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    borderRadius: {
                        '4xl': '2rem',
                    },
                    colors: {
                        'rosewater': 'var(--rosewater)', 'flamingo': 'var(--flamingo)',
                        'pink': 'var(--pink)', 'mauve': 'var(--mauve)',
                        'red': 'var(--red)', 'maroon': 'var(--maroon)',
                        'peach': 'var(--peach)', 'yellow': 'var(--yellow)',
                        'green': 'var(--green)', 'teal': 'var(--teal)',
                        'sky': 'var(--sky)', 'sapphire': 'var(--sapphire)',
                        'blue': 'var(--blue)', 'lavender': 'var(--lavender)',
                        'text': 'var(--text)', 'subtext1': 'var(--subtext1)',
                        'subtext0': 'var(--subtext0)', 'overlay2': 'var(--overlay2)',
                        'overlay1': 'var(--overlay1)', 'overlay0': 'var(--overlay0)',
                        'surface2': 'var(--surface2)', 'surface1': 'var(--surface1)',
                        'surface0': 'var(--surface0)', 'base': 'var(--base)',
                        'mantle': 'var(--mantle)', 'crust': 'var(--crust)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-crust text-text min-h-screen p-2 sm:p-4">

    <main id="main-container" class="w-full max-w-4xl mx-auto flex flex-col gap-4 h-full">
        <!-- Header -->
        <header class="flex items-center justify-center gap-6 flex-shrink-0 mb-6">
            <img src="/static/icons/logo.png" alt="AI Context Logo" class="w-16 h-16 sm:w-20 sm:h-20">
            <h1 class="text-4xl sm:text-5xl font-bold text-peach">AI Context</h1>
        </header>

        <!-- Input Section -->
        <div class="flex flex-col gap-4 flex-shrink-0">
             <input type="text" id="url-input"
                   class="w-full py-1 text-base input-underline"
                   placeholder="Paste a URL and press Enter...">
            <input type="text" id="ignore-input"
                   class="w-full py-1 text-base input-underline"
                   placeholder="Ignore patterns (optional): e.g., tests,*.log">
        </div>
       
        <!-- Output & Placeholder -->
        <div id="output-section" class="mt-4 flex-grow min-h-0">
            <!-- This container will hold either the placeholder or the result -->
        </div>
    </main>

    <!-- HTML Templates -->
    <template id="placeholder-template">
        <div id="placeholder-container" class="text-center py-5 border-2 border-dashed border-surface0 rounded-2xl h-full flex items-center justify-center">
            <p class="text-overlay2">Waiting for a URL to process...</p>
        </div>
    </template>

    <template id="loading-template">
        <div id="loading-container" class="text-center py-10 border-2 border-dashed border-surface0 rounded-2xl h-full flex flex-col items-center justify-center gap-4">
            <i data-lucide="loader-2" class="animate-spin text-3xl text-peach"></i>
            <p class="text-overlay2">Generating context, please wait...</p>
        </div>
    </template>

    <template id="output-template">
        <div id="output-container" class="bg-mantle rounded-2xl shadow-2xl flex flex-col h-full">
            <div class="flex-shrink-0 p-1 bg-opacity-50 bg-base rounded-t-2xl flex justify-end items-center border-b border-surface0">
                <div class="flex gap-4 pr-2 text-xl text-subtext0">
                    <button id="download-btn" title="Download" class="hover:text-teal transition-colors"><i data-lucide="download"></i></button>
                    <button id="copy-btn" title="Copy" class="hover:text-teal transition-colors"><i data-lucide="copy"></i></button>
                    <button id="clear-btn" title="Clear" class="hover:text-lavender transition-colors"><i data-lucide="x-circle"></i></button>
                </div>
            </div>
            <pre class="flex-grow p-4 sm:p-6 text-sm overflow-auto"><code id="generated-code" class="language-markdown text-text"></code></pre>
        </div>
    </template>

    <script>
        // DOM element references
        const urlInput = document.getElementById('url-input');
        const ignoreInput = document.getElementById('ignore-input');
        const outputSection = document.getElementById('output-section');

        // Template references
        const placeholderTemplate = document.getElementById('placeholder-template');
        const loadingTemplate = document.getElementById('loading-template');
        const outputTemplate = document.getElementById('output-template');
        const showPlaceholder = () => {
            outputSection.innerHTML = '';
            outputSection.appendChild(placeholderTemplate.content.cloneNode(true));
        };
        const showLoadingState = () => {
            outputSection.innerHTML = '';
            outputSection.appendChild(loadingTemplate.content.cloneNode(true));
            lucide.createIcons();
        };
        const showOutputContainer = (content) => {
            outputSection.innerHTML = '';
            const outputClone = outputTemplate.content.cloneNode(true);
            const codeElement = outputClone.querySelector('#generated-code');
            const copyBtn = outputClone.querySelector('#copy-btn');
            const clearBtn = outputClone.querySelector('#clear-btn');
            const downloadBtn = outputClone.querySelector('#download-btn');
            const sanitizedContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            codeElement.innerHTML = sanitizedContent;
            copyBtn.addEventListener('click', () => handleCopy(content));
            clearBtn.addEventListener('click', handleClear);
            downloadBtn.addEventListener('click', handleDownload);
            outputSection.appendChild(outputClone);
            lucide.createIcons();
        };

        const handleGeneration = async () => {
            const url = urlInput.value.trim();
            if (!url) return;
            showLoadingState();
            const ignorePatterns = ignoreInput.value.trim().split(',').filter(p => p);
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, ignore: ignorePatterns })
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || `Server error: ${response.status}`);
                }
                const result = await response.json();
                showOutputContainer(result.content);
            } catch (error) {
                console.error('Generation failed:', error);
                const errorMessage = `Error: ${error.message}`;
                showOutputContainer(errorMessage);
            }
        };
        
        const handleClear = async () => {
            try {
                const response = await fetch('/clear', { method: 'POST' });
                if (!response.ok) throw new Error('Failed to clear file on server.');
                urlInput.value = '';
                ignoreInput.value = '';
                showPlaceholder();
                urlInput.focus();
            } catch (error) {
                console.error('Clear failed:', error);
                const errorContainer = document.createElement('div');
                errorContainer.className = 'text-red-400 text-center p-2';
                errorContainer.textContent = 'Could not clear the context file. Please check the server logs.';
                outputSection.insertAdjacentElement('beforebegin', errorContainer);
                setTimeout(() => errorContainer.remove(), 3000);
            }
        };
        
        const handleCopy = (textToCopy) => {
            if (typeof textToCopy !== 'string') return;
            const textArea = document.createElement('textarea');
            textArea.value = textToCopy;
            textArea.style.position = 'fixed';
            textArea.style.top = '-9999px';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                const copyBtn = document.getElementById('copy-btn');
                if (copyBtn) {
                    copyBtn.innerHTML = '<i data-lucide="check" class="text-teal"></i>';
                    lucide.createIcons({ nodes: [copyBtn] });
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i data-lucide="copy"></i>';
                        lucide.createIcons({ nodes: [copyBtn] });
                    }, 2000);
                }
            } catch (err) {
                console.error('Fallback: Error copying text', err);
            }
            document.body.removeChild(textArea);
        };

        const handleDownload = () => {
            window.location.href = '/download';
        };
        
        const loadInitialContent = async () => {
            try {
                 const response = await fetch('/load');
                 if (response.ok) {
                     const result = await response.json();
                     if (result.content) {
                        showOutputContainer(result.content);
                     } else {
                        showPlaceholder();
                     }
                 } else {
                     showPlaceholder();
                 }
            } catch (error) {
                console.error("Could not load initial content:", error);
                showPlaceholder();
            }
        };

        // Event Listeners
        urlInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') handleGeneration();
        });
        ignoreInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') handleGeneration();
        });
        // Load content when the page ready
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialContent();
            lucide.createIcons();
        });

    </script>
</body>
</html>
